<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annonce — ExpatBrazza</title>
<meta name="description" content="Détail annonce ExpatBrazza">

<!-- Open Graph pour partage WhatsApp -->
<meta property="og:site_name" content="ExpatBrazza">
<meta property="og:type" content="website">
<meta id="ogTitle" property="og:title" content="Annonce — ExpatBrazza">
<meta id="ogDesc" property="og:description" content="Voir cette annonce sur ExpatBrazza">
<meta id="ogImage" property="og:image" content="">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --green:  #00A550;
  --green2: #00C060;
  --yellow: #F9C003;
  --red:    #CE1126;
  --bg:     #F4F6F8;
  --white:  #FFFFFF;
  --card:   #FFFFFF;
  --border: #E2E8F0;
  --text:   #0F172A;
  --muted:  #64748B;
  --dim:    #94A3B8;
  --dark:   #1E293B;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); font-size:14px; }

/* ── NAV ── */
.navbar {
  background:var(--white);
  border-bottom:1px solid var(--border);
  padding:0 5%;
  height:56px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:100;
}

.nav-logo {
  display:flex;
  align-items:center;
  gap:8px;
  text-decoration:none;
}

.logo-sq {
  width:32px; height:32px;
  background:var(--green);
  border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:16px;
  color:white;
}

.nav-brand {
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:15px;
}

.nav-brand span { color:var(--green); }

.nav-back {
  display:flex;
  align-items:center;
  gap:6px;
  color:var(--muted);
  font-size:13px;
  font-weight:500;
  text-decoration:none;
  padding:7px 14px;
  border:1px solid var(--border);
  border-radius:6px;
  transition:all 0.2s;
}

.nav-back:hover { color:var(--green); border-color:var(--green); }

.nav-back svg { width:14px; height:14px; }

/* ── BREADCRUMB ── */
.breadcrumb {
  padding:12px 5%;
  display:flex;
  align-items:center;
  gap:6px;
  font-size:12px;
  color:var(--dim);
  flex-wrap:wrap;
}

.breadcrumb a { color:var(--muted); text-decoration:none; }
.breadcrumb a:hover { color:var(--green); }
.breadcrumb span { color:var(--text); font-weight:500; }

/* ── LAYOUT ── */
.layout {
  max-width:1100px;
  margin:0 auto;
  padding:0 5% 60px;
  display:grid;
  grid-template-columns:1fr 340px;
  gap:24px;
  align-items:start;
}

@media(max-width:900px){
  .layout { grid-template-columns:1fr; }
  .sidebar { order:-1; }
}

/* ── MAIN CONTENT ── */
.main {}

/* IMAGE GALLERY */
.gallery {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  margin-bottom:20px;
  position:relative;
}

.gallery-main {
  width:100%;
  aspect-ratio:16/10;
  object-fit:cover;
  display:block;
  background:var(--bg);
  cursor:pointer;
}

.gallery-main.no-img {
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#f0fdf4,#dcfce7);
}

.gallery-placeholder svg { width:64px; height:64px; fill:var(--green); opacity:0.3; }

.gallery-thumbs {
  display:flex;
  gap:8px;
  padding:12px;
  overflow-x:auto;
  border-top:1px solid var(--border);
}

.gallery-thumbs::-webkit-scrollbar { height:4px; }
.gallery-thumbs::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.thumb {
  width:72px; height:52px;
  border-radius:6px;
  object-fit:cover;
  cursor:pointer;
  border:2px solid transparent;
  flex-shrink:0;
  transition:border-color 0.2s;
}

.thumb.active { border-color:var(--green); }

/* Badges overlay */
.gallery-badges {
  position:absolute;
  top:14px; left:14px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.badge {
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:5px 10px;
  border-radius:6px;
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.5px;
}

.badge-une { background:var(--yellow); color:#1a1a00; }
.badge-new { background:var(--green); color:white; }
.badge-certified { background:rgba(255,255,255,0.95); color:var(--green); border:1px solid var(--green); }

/* ANNONCE CARD */
.annonce-card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:24px;
  margin-bottom:20px;
}

.annonce-top {
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:16px;
  flex-wrap:wrap;
}

.annonce-cat {
  font-size:11px;
  font-weight:600;
  color:var(--green);
  background:rgba(0,165,80,0.08);
  padding:4px 10px;
  border-radius:4px;
  text-transform:uppercase;
  letter-spacing:0.5px;
}

.annonce-date { font-size:12px; color:var(--dim); }

.annonce-title {
  font-family:'Syne',sans-serif;
  font-size:clamp(20px,3vw,28px);
  font-weight:800;
  line-height:1.2;
  margin-bottom:12px;
  letter-spacing:-0.3px;
}

.annonce-price {
  font-family:'Syne',sans-serif;
  font-size:clamp(24px,4vw,32px);
  font-weight:800;
  color:var(--green);
  margin-bottom:16px;
}

.annonce-price .currency { font-size:16px; color:var(--muted); font-weight:500; font-family:'DM Sans',sans-serif; margin-left:4px; }

.annonce-meta {
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-bottom:20px;
  padding-bottom:20px;
  border-bottom:1px solid var(--border);
}

.meta-item {
  display:flex;
  align-items:center;
  gap:6px;
  font-size:13px;
  color:var(--muted);
}

.meta-item svg { width:14px; height:14px; fill:var(--dim); flex-shrink:0; }
.meta-item strong { color:var(--text); font-weight:500; }

/* DESCRIPTION */
.desc-section { margin-bottom:20px; }
.desc-title {
  font-family:'Syne',sans-serif;
  font-size:15px;
  font-weight:700;
  margin-bottom:12px;
}

.desc-text {
  font-size:14px;
  color:var(--dark);
  line-height:1.8;
  white-space:pre-wrap;
}

/* SHARE ROW */
.share-row {
  display:flex;
  gap:10px;
  padding-top:16px;
  border-top:1px solid var(--border);
  flex-wrap:wrap;
}

.btn-share {
  display:flex;
  align-items:center;
  gap:6px;
  padding:8px 14px;
  border-radius:8px;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  border:none;
  transition:all 0.2s;
  font-family:'DM Sans',sans-serif;
}

.btn-report {
  margin-left:auto;
  background:none;
  border:1px solid var(--border);
  color:var(--dim);
  padding:8px 14px;
  border-radius:8px;
  font-size:12px;
  cursor:pointer;
  font-family:'DM Sans',sans-serif;
  transition:all 0.2s;
}

.btn-report:hover { border-color:var(--red); color:var(--red); }

/* VUES */
.vues-row {
  display:flex;
  align-items:center;
  gap:6px;
  font-size:12px;
  color:var(--dim);
  margin-top:12px;
}

.vues-row svg { width:14px; height:14px; fill:var(--dim); }

/* ── SIDEBAR ── */
.sidebar {}

/* VENDEUR CARD */
.vendeur-card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:20px;
  margin-bottom:20px;
}

.vc-title {
  font-size:11px;
  font-weight:600;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:16px;
}

.vc-profile {
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
  padding-bottom:16px;
  border-bottom:1px solid var(--border);
}

.vc-avatar {
  width:52px; height:52px;
  border-radius:12px;
  background:linear-gradient(135deg,var(--green),#007A3D);
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:22px;
  color:white;
  flex-shrink:0;
  position:relative;
}

.verified-badge {
  position:absolute;
  bottom:-3px; right:-3px;
  width:18px; height:18px;
  background:var(--green);
  border-radius:50%;
  border:2px solid white;
  display:flex;
  align-items:center;
  justify-content:center;
}

.verified-badge svg { width:10px; height:10px; fill:white; }

.vc-info {}
.vc-name {
  font-family:'Syne',sans-serif;
  font-size:16px;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:6px;
}

.vc-name svg { width:14px; height:14px; fill:var(--green); }
.vc-since { font-size:12px; color:var(--muted); margin-top:2px; }
.vc-annonces { font-size:12px; color:var(--green); font-weight:500; margin-top:2px; }

/* Stats vendeur */
.vc-stats {
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
  margin-bottom:16px;
}

.vc-stat {
  background:var(--bg);
  border-radius:8px;
  padding:10px 8px;
  text-align:center;
}

.vc-stat-val {
  font-family:'Syne',sans-serif;
  font-size:18px;
  font-weight:800;
  color:var(--text);
}

.vc-stat-label { font-size:10px; color:var(--muted); margin-top:2px; }

/* CTA Buttons */
.btn-wa {
  width:100%;
  background:#25D366;
  color:white;
  border:none;
  padding:13px;
  border-radius:10px;
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin-bottom:8px;
  transition:all 0.2s;
  text-decoration:none;
}

.btn-wa:hover { background:#128C7E; transform:translateY(-1px); }
.btn-wa svg { width:18px; height:18px; fill:white; flex-shrink:0; }

.btn-call {
  width:100%;
  background:none;
  border:1.5px solid var(--green);
  color:var(--green);
  padding:11px;
  border-radius:10px;
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  transition:all 0.2s;
  text-decoration:none;
}

.btn-call:hover { background:var(--green); color:white; }
.btn-call svg { width:16px; height:16px; fill:currentColor; }

/* Numéro masqué */
.phone-reveal {
  width:100%;
  background:none;
  border:1.5px solid var(--border);
  color:var(--muted);
  padding:10px;
  border-radius:8px;
  font-family:'DM Sans',sans-serif;
  font-size:13px;
  cursor:pointer;
  margin-top:8px;
  transition:all 0.2s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}

.phone-reveal:hover { border-color:var(--green); color:var(--green); }
.phone-reveal svg { width:14px; height:14px; fill:currentColor; }

/* ── AUTRES ANNONCES VENDEUR ── */
.autres-card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  margin-bottom:20px;
}

.autres-title {
  font-family:'Syne',sans-serif;
  font-size:14px;
  font-weight:700;
  margin-bottom:14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.voir-tout {
  font-size:12px;
  font-weight:500;
  color:var(--green);
  text-decoration:none;
}

.mini-annonce {
  display:flex;
  gap:10px;
  padding:10px 0;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  transition:background 0.15s;
  border-radius:6px;
  text-decoration:none;
  color:inherit;
}

.mini-annonce:last-child { border-bottom:none; }
.mini-annonce:hover { background:var(--bg); padding-left:6px; }

.mini-img {
  width:60px; height:52px;
  border-radius:8px;
  object-fit:cover;
  background:var(--bg);
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

.mini-img svg { width:22px; height:22px; fill:var(--dim); }

.mini-info {}
.mini-titre {
  font-size:13px;
  font-weight:600;
  line-height:1.3;
  margin-bottom:4px;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.mini-prix { font-size:13px; font-weight:700; color:var(--green); }
.mini-ville { font-size:11px; color:var(--dim); margin-top:2px; }

/* ── ANNONCES SIMILAIRES ── */
.similaires-section {
  max-width:1100px;
  margin:0 auto;
  padding:0 5% 60px;
}

.sim-title {
  font-family:'Syne',sans-serif;
  font-size:20px;
  font-weight:800;
  margin-bottom:20px;
  display:flex;
  align-items:center;
  gap:10px;
}

.sim-title::before {
  content:'';
  width:4px; height:24px;
  background:var(--green);
  border-radius:2px;
}

.sim-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:14px;
}

.sim-card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:all 0.2s;
  text-decoration:none;
  color:inherit;
  display:block;
}

.sim-card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,0.08); border-color:var(--green); }

.sim-img {
  width:100%;
  aspect-ratio:4/3;
  object-fit:cover;
  background:var(--bg);
  display:flex;
  align-items:center;
  justify-content:center;
}

.sim-img svg { width:40px; height:40px; fill:var(--dim); opacity:0.4; }

.sim-body { padding:12px; }
.sim-titre { font-size:13px; font-weight:600; margin-bottom:6px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.sim-prix { font-size:15px; font-weight:800; color:var(--green); }
.sim-meta { font-size:11px; color:var(--dim); margin-top:4px; }

/* ── LOADING ── */
.loading {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:60vh;
  gap:16px;
  color:var(--muted);
}

.spinner {
  width:36px; height:36px;
  border:3px solid var(--border);
  border-top-color:var(--green);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}

@keyframes spin { to{transform:rotate(360deg)} }

/* ── ERROR ── */
.error-state {
  text-align:center;
  padding:80px 20px;
  color:var(--muted);
}

.error-state h2 { font-family:'Syne',sans-serif; font-size:24px; color:var(--text); margin-bottom:8px; }

/* ── SKELETON ── */
.skeleton {
  background:linear-gradient(90deg,var(--border) 25%,var(--bg) 50%,var(--border) 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
  border-radius:6px;
}
@keyframes shimmer { from{background-position:200% 0} to{background-position:-200% 0} }

/* ── TOAST ── */
.toast {
  position:fixed;
  bottom:24px; right:24px;
  background:var(--dark);
  color:white;
  padding:12px 18px;
  border-radius:10px;
  font-size:13px;
  font-weight:500;
  z-index:9999;
  opacity:0;
  transform:translateY(16px);
  transition:all 0.3s;
  box-shadow:0 8px 24px rgba(0,0,0,0.2);
}

.toast.show { opacity:1; transform:translateY(0); }

/* ── MODAL IMAGE ── */
.img-modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.92);
  z-index:1000;
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.img-modal.active { display:flex; }
.img-modal img { max-width:100%; max-height:90vh; object-fit:contain; border-radius:8px; }

.img-modal-close {
  position:absolute;
  top:16px; right:16px;
  background:rgba(255,255,255,0.1);
  border:none;
  color:white;
  width:36px; height:36px;
  border-radius:50%;
  cursor:pointer;
  font-size:18px;
  display:flex; align-items:center; justify-content:center;
}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .layout { padding:0 4% 40px; }
  .breadcrumb { padding:10px 4%; }
  .annonce-card { padding:16px; }
  .vendeur-card { padding:16px; }
  .similaires-section { padding:0 4% 40px; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="navbar">
  <a class="nav-logo" href="index.html">
    <img src="EB_globe_logo_blanc.png" alt="ExpatBrazza" style="height:38px;">
  </a>
  <a class="nav-back" href="index.html">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    Retour aux annonces
  </a>
</nav>

<!-- BREADCRUMB -->
<div class="breadcrumb" id="breadcrumb">
  <a href="index.html">Accueil</a> /
  <a href="#" id="bcCat">—</a> /
  <span id="bcTitre">Chargement...</span>
</div>

<!-- LOADING STATE -->
<div class="loading" id="loadingState">
  <div class="spinner"></div>
  <p>Chargement de l'annonce...</p>
</div>

<!-- ERROR STATE -->
<div class="error-state" id="errorState" style="display:none">
  <h2>Annonce introuvable</h2>
  <p>Cette annonce n'existe plus ou a été supprimée.</p>
  <a href="index.html" style="display:inline-block;margin-top:20px;background:var(--green);color:white;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:600">
    Retour aux annonces
  </a>
</div>

<!-- MAIN LAYOUT -->
<div class="layout" id="mainLayout" style="display:none">

  <!-- COLONNE PRINCIPALE -->
  <div class="main">

    <!-- GALERIE -->
    <div class="gallery" id="gallery">
      <div class="gallery-badges" id="galleryBadges"></div>
      <div class="gallery-main no-img" id="galleryMain">
        <div class="gallery-placeholder">
          <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
        </div>
      </div>
    </div>

    <!-- ANNONCE CARD -->
    <div class="annonce-card">
      <div class="annonce-top">
        <span class="annonce-cat" id="annoncecat">—</span>
        <span class="annonce-date" id="annonceDate">—</span>
      </div>
      <h1 class="annonce-title" id="annonceTitre">Chargement...</h1>
      <div class="annonce-price" id="annoncePrix">—</div>

      <div class="annonce-meta">
        <div class="meta-item">
          <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
          <strong id="annonceVille">—</strong>
        </div>
        <div class="meta-item">
          <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
          <strong id="annonceQuartier">—</strong>
        </div>
        <div class="meta-item">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
