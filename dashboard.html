<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Espace | ExpatBrazza</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --green:#00A550; --text:#1A1F2E; --muted:#6B7280; --border:#DDE1E7; --bg:#F5F7FA; --card:#fff; --red:#CE1126; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); }
  nav { background:#fff; border-bottom:1px solid var(--border); padding:0 24px; height:64px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
  .logo-icon { width:38px; height:38px; background:linear-gradient(135deg,#00A550,#00c764); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; }
  .logo-text { font-family:'Syne',sans-serif; font-weight:800; font-size:20px; color:var(--text); }
  .logo-text span { color:var(--green); }
  .nav-right { display:flex; align-items:center; gap:12px; }
  .user-badge { display:flex; align-items:center; gap:8px; background:rgba(0,165,80,0.1); border-radius:10px; padding:8px 14px; }
  .user-avatar { width:32px; height:32px; background:var(--green); border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:14px; }
  .user-name { font-size:14px; font-weight:600; color:var(--green); }
  .btn-logout { background:none; border:1px solid var(--border); color:var(--muted); padding:8px 14px; border-radius:8px; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:13px; transition:all 0.2s; }
  .btn-logout:hover { border-color:var(--red); color:var(--red); }
  .section { max-width:1000px; margin:0 auto; padding:40px 24px; }
  .dashboard-header { margin-bottom:32px; }
  .dashboard-header h1 { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; margin-bottom:4px; }
  .dashboard-header p { color:var(--muted); }
  .stats-row { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; margin-bottom:32px; }
  @media(max-width:600px){ .stats-row { grid-template-columns:1fr 1fr; } }
  .stat-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px; }
  .stat-card .num { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; color:var(--green); }
  .stat-card .label { color:var(--muted); font-size:13px; margin-top:4px; }
  .section-title { font-family:'Syne',sans-serif; font-size:18px; font-weight:700; margin-bottom:16px; display:flex; align-items:center; justify-content:space-between; }
  .btn-new { background:var(--green); color:#fff; border:none; padding:10px 18px; border-radius:8px; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; text-decoration:none; display:inline-flex; align-items:center; gap:6px; transition:all 0.2s; }
  .btn-new:hover { background:#00c764; }
  .annonce-row { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px 20px; margin-bottom:12px; display:flex; align-items:center; gap:16px; }
  .annonce-row-img { width:56px; height:56px; border-radius:10px; object-fit:cover; background:var(--bg); display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
  .annonce-row-info { flex:1; }
  .annonce-row-title { font-weight:600; font-size:15px; margin-bottom:4px; }
  .annonce-row-meta { color:var(--muted); font-size:13px; display:flex; gap:12px; flex-wrap:wrap; }
  .badge { padding:3px 10px; border-radius:6px; font-size:11px; font-weight:700; text-transform:uppercase; }
  .badge-actif { background:rgba(0,165,80,0.1); color:var(--green); }
  .badge-attente { background:rgba(249,192,3,0.15); color:#B8860B; }
  .badge-refuse { background:rgba(206,17,38,0.1); color:var(--red); }
  .annonce-row-actions { display:flex; gap:8px; flex-shrink:0; }
  .btn-delete { background:rgba(206,17,38,0.1); color:var(--red); border:none; padding:8px 12px; border-radius:8px; cursor:pointer; font-size:13px; transition:all 0.2s; font-family:'DM Sans',sans-serif; }
  .btn-delete:hover { background:var(--red); color:#fff; }
  .empty-state { text-align:center; padding:60px 24px; color:var(--muted); }
  .empty-icon { font-size:48px; margin-bottom:16px; }
  .empty-state h3 { font-family:'Syne',sans-serif; font-size:18px; color:var(--text); margin-bottom:8px; }
  .loading { text-align:center; padding:40px; color:var(--muted); }
  @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">
    <div class="logo-icon">🌍</div>
    <div class="logo-text">Expat<span>Brazza</span></div>
  </a>
  <div class="nav-right">
    <div class="user-badge">
      <div class="user-avatar" id="userInitial">?</div>
      <span class="user-name" id="userName">...</span>
    </div>
    <button class="btn-logout" onclick="handleLogout()">Déconnexion</button>
  </div>
</nav>

<div class="section">
  <div class="dashboard-header">
    <h1>Mon Espace 👤</h1>
    <p>Gérez vos annonces et suivez leur activité</p>
  </div>

  <!-- QUICK ACTIONS -->
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:28px">
    <a href="index.html" style="background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;text-decoration:none;color:var(--text);transition:all 0.2s" onmouseover="this.style.borderColor='#00A550'" onmouseout="this.style.borderColor='#DDE1E7'">
      <div style="font-size:24px;margin-bottom:6px">🏠</div>
      <div style="font-size:13px;font-weight:600">Accueil</div>
    </a>
    <a href="index.html" onclick="event.preventDefault();window.location.href='index.html#post'" style="background:#00A550;border:1px solid #00A550;border-radius:12px;padding:16px;text-align:center;text-decoration:none;color:#fff;transition:all 0.2s">
      <div style="font-size:24px;margin-bottom:6px">➕</div>
      <div style="font-size:13px;font-weight:600">Nouvelle annonce</div>
    </a>
    <a href="index.html" style="background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;text-decoration:none;color:var(--text);transition:all 0.2s" onmouseover="this.style.borderColor='#00A550'" onmouseout="this.style.borderColor='#DDE1E7'">
      <div style="font-size:24px;margin-bottom:6px">🔍</div>
      <div style="font-size:13px;font-weight:600">Rechercher</div>
    </a>
    <a href="contact.html" style="background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;text-decoration:none;color:var(--text);transition:all 0.2s" onmouseover="this.style.borderColor='#00A550'" onmouseout="this.style.borderColor='#DDE1E7'">
      <div style="font-size:24px;margin-bottom:6px">✉️</div>
      <div style="font-size:13px;font-weight:600">Contact</div>
    </a>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="num" id="statTotal">0</div>
      <div class="label">Annonces total</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statActif">0</div>
      <div class="label">Annonces actives</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statAttente">0</div>
      <div class="label">En attente</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statVues">0</div>
      <div class="label">👁️ Vues totales</div>
    </div>
  </div>

  <div class="section-title">
    Mes annonces
    <a href="index.html" class="btn-new">+ Nouvelle annonce</a>
  </div>

  <div id="annoncesList">
    <div class="loading">⏳ Chargement de vos annonces...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://zpoitnronthawiovlnkm.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpwb2l0bnJvbnRoYXdpb3ZsbmttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjkzNzgsImV4cCI6MjA5MDA0NTM3OH0.kLIWKReNwqpG-VYf_tN14P9cQq-0z3fsIQffaFvOeUA';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const emojis = { 'Immobilier':'🏠','Véhicules':'🚗','Emploi':'💼','Électronique':'📱','Services':'🛠️','Mode':'👗','Alimentation':'🍽️','Loisirs':'🎮' };


  function showNotif(msg) {
    const el = document.createElement('div');
    el.style.cssText = 'position:fixed;top:80px;right:20px;background:#00A550;color:#fff;padding:14px 20px;border-radius:12px;font-size:14px;font-weight:500;z-index:9999;box-shadow:0 8px 24px rgba(0,165,80,0.4);animation:slideIn 0.3s ease';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 5000);
  }

  async function loadDashboard() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return window.location.href = 'auth.html';

    const user = session.user;
    const name = user.user_metadata?.name || user.email.split('@')[0];
    document.getElementById('userName').textContent = name;
    document.getElementById('userInitial').textContent = name.charAt(0).toUpperCase();

    const { data: annonces, error } = await sb.from('annonces').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
    
    // Check for newly approved annonces (FIX 11)
    const newlyApproved = annonces ? annonces.filter(a => a.statut === 'actif' && !sessionStorage.getItem('notified_' + a.id)) : [];
    if (newlyApproved.length > 0) {
      newlyApproved.forEach(a => sessionStorage.setItem('notified_' + a.id, '1'));
      showNotif('✅ ' + newlyApproved.length + ' annonce(s) approuvée(s) et publiée(s) !');
    }

    if (error || !annonces) {
      document.getElementById('annoncesList').innerHTML = '<div class="empty-state"><div class="empty-icon">😕</div><h3>Erreur de chargement</h3></div>';
      return;
    }

    document.getElementById('statTotal').textContent = annonces.length;
    document.getElementById('statActif').textContent = annonces.filter(a => a.statut === 'actif').length;
    document.getElementById('statAttente').textContent = annonces.filter(a => a.statut === 'en_attente').length;
    const totalVues = annonces.reduce((sum, a) => sum + (a.vues || 0), 0);
    if (document.getElementById('statVues')) document.getElementById('statVues').textContent = totalVues;

    if (annonces.length === 0) {
      document.getElementById('annoncesList').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <h3>Aucune annonce pour le moment</h3>
          <p>Publiez votre première annonce gratuitement !</p>
          <br>
          <a href="index.html" class="btn-new" style="display:inline-flex">+ Publier une annonce</a>
        </div>`;
      return;
    }

    document.getElementById('annoncesList').innerHTML = annonces.map(a => `
      <div class="annonce-row" id="row-${a.id}">
        ${a.image_url 
          ? `<img src="${a.image_url}" class="annonce-row-img">` 
          : `<div class="annonce-row-img">${emojis[a.categorie] || '📦'}</div>`
        }
        <div class="annonce-row-info">
          <div class="annonce-row-title">${a.titre}</div>
          <div class="annonce-row-meta">
            <span>${a.prix} FCFA</span>
            <span>📍 ${a.quartier || a.ville || 'Brazzaville'}</span>
            <span>${a.categorie}</span>
            <span>👁️ ${a.vues || 0} vue${(a.vues||0) > 1 ? 's' : ''}</span>
            <span class="badge ${a.statut === 'actif' ? 'badge-actif' : a.statut === 'en_attente' ? 'badge-attente' : 'badge-refuse'}">
              ${a.statut === 'actif' ? '✅ Actif' : a.statut === 'en_attente' ? '⏳ En attente' : '❌ Refusé'}
            </span>
          </div>
        </div>
        <div class="annonce-row-actions">
          <button class="btn-delete" onclick="deleteAnnonce('${a.id}')">🗑️ Supprimer</button>
        </div>
      </div>
    `).join('');
  }

  async function deleteAnnonce(id) {
    if (!confirm('Supprimer cette annonce ?')) return;
    const { error } = await sb.from('annonces').delete().eq('id', id);
    if (!error) {
      document.getElementById('row-' + id).remove();
      alert('Annonce supprimée !');
    }
  }

  async function handleLogout() {
    await sb.auth.signOut();
    window.location.href = 'index.html';
  }

  window.onload = loadDashboard;
</script>
</body>
</html>
