<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | ExpatBrazza</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  /* (garde tout le CSS inchangé, celui que tu avais avant) */
  :root { --green:#00A550; --text:#1A1F2E; --muted:#6B7280; --border:#DDE1E7; --bg:#F5F7FA; --card:#fff; --red:#CE1126; --yellow:#F9C003; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); }
  /* ... tout le reste du CSS identique à ton admin.html actuel ... */
  /* Je ne recopie pas l'intégralité ici pour éviter la surcharge, mais garde ton CSS existant */
  /* Assure-toi d'avoir les classes .modal-overlay, .modal, etc. */
</style>
</head>
<body>

<!-- LOGIN SCREEN (identique) -->
<div class="admin-login" id="loginScreen">...</div>

<!-- ADMIN PANEL (identique, avec sidebar et toutes les pages) -->
<div id="adminPanel" style="display:none">
  ... (même structure que précédemment, avec l'onglet Blog)
</div>

<!-- MODAL ÉDITEUR BLOG (sans TinyMCE) -->
<div class="modal-overlay" id="blogModal">
  <div class="modal">
    <span class="modal-close" onclick="closeBlogModal()">&times;</span>
    <h2 id="blogModalTitle">Nouvel article</h2>
    <input type="hidden" id="blogEditId">
    <div class="form-group"><label>Titre</label><input type="text" id="blogTitle" placeholder="Titre de l'article"></div>
    <div class="form-group"><label>Slug (URL)</label><input type="text" id="blogSlug" placeholder="ex: mon-article"></div>
    <div class="form-group"><label>Résumé (extrait)</label><textarea id="blogExcerpt" rows="2" placeholder="Brève description"></textarea></div>
    <div class="form-group"><label>Image (URL)</label><input type="text" id="blogImage" placeholder="https://expatbrazza.com/images/article.jpg"></div>
    <div class="form-group"><label>Contenu (HTML)</label><textarea id="blogContent" rows="15" style="font-family:monospace; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px; width:100%;"></textarea></div>
    <div class="form-group">
      <label><input type="checkbox" id="blogPublished"> Publié</label>
    </div>
    <button class="btn-primary" onclick="saveBlogPost()">Enregistrer</button>
  </div>
</div>

<script>
  // (recopie tout le script de ton admin.html actuel, mais en remplaçant les parties TinyMCE)
  const SUPABASE_URL = 'https://zpoitnronthawiovlnkm.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpwb2l0bnJvbnRoYXdpb3ZsbmttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjkzNzgsImV4cCI6MjA5MDA0NTM3OH0.kLIWKReNwqpG-VYf_tN14P9cQq-0z3fsIQffaFvOeUA';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const ADMIN_EMAIL = 'mahouka.djels@gmail.com';
  // ... toutes les autres fonctions (loadStats, loadPending, etc.) restent identiques ...
  // Seules les fonctions du blog sont modifiées :

  async function loadBlogPosts() {
    const { data, error } = await sb.from('blog_posts').select('*').order('created_at', { ascending: false });
    const container = document.getElementById('blogPostsList');
    if (error || !data || data.length === 0) { container.innerHTML = '<div class="empty">Aucun article</div>'; return; }
    container.innerHTML = `<table><thead><tr><th>Titre</th><th>Slug</th><th>Publié</th><th>Date</th><th>Actions</th></tr></thead><tbody>${data.map(post => `<tr><td>${post.title}</td><td>${post.slug}</td><td>${post.published ? '✅ Oui' : '❌ Non'}</td><td>${new Date(post.created_at).toLocaleDateString('fr-FR')}</td><td><button class="btn-approve" onclick="editBlogPost(${post.id})">✏️ Modifier</button><button class="btn-del" onclick="deleteBlogPost(${post.id})">🗑️ Supprimer</button></td></tr>`).join('')}</tbody></table>`;
  }

  function openBlogEditor(id = null) {
    document.getElementById('blogModal').classList.add('active');
    document.getElementById('blogEditId').value = '';
    document.getElementById('blogTitle').value = '';
    document.getElementById('blogSlug').value = '';
    document.getElementById('blogExcerpt').value = '';
    document.getElementById('blogImage').value = '';
    document.getElementById('blogPublished').checked = false;
    document.getElementById('blogContent').value = '';
    if (id) editBlogPost(id);
    document.getElementById('blogModalTitle').innerText = id ? 'Modifier l\'article' : 'Nouvel article';
  }

  async function editBlogPost(id) {
    const { data, error } = await sb.from('blog_posts').select('*').eq('id', id).single();
    if (error) { alert('Erreur chargement'); return; }
    document.getElementById('blogEditId').value = data.id;
    document.getElementById('blogTitle').value = data.title;
    document.getElementById('blogSlug').value = data.slug;
    document.getElementById('blogExcerpt').value = data.excerpt || '';
    document.getElementById('blogImage').value = data.image_url || '';
    document.getElementById('blogPublished').checked = data.published;
    document.getElementById('blogContent').value = data.content || '';
    document.getElementById('blogModal').classList.add('active');
    document.getElementById('blogModalTitle').innerText = 'Modifier l\'article';
  }

  async function saveBlogPost() {
    const id = document.getElementById('blogEditId').value;
    const title = document.getElementById('blogTitle').value.trim();
    let slug = document.getElementById('blogSlug').value.trim();
    const excerpt = document.getElementById('blogExcerpt').value.trim();
    const image_url = document.getElementById('blogImage').value.trim();
    const published = document.getElementById('blogPublished').checked;
    const content = document.getElementById('blogContent').value;
    if (!title || !slug || !content) { alert('Titre, slug et contenu sont obligatoires'); return; }
    if (!slug) slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    const postData = { title, slug, excerpt, content, image_url: image_url || null, published, updated_at: new Date() };
    if (published && !id) postData.published_at = new Date();
    let error;
    if (id) { const { error: e } = await sb.from('blog_posts').update(postData).eq('id', id); error = e; }
    else { postData.created_at = new Date(); if (published) postData.published_at = new Date(); const { error: e } = await sb.from('blog_posts').insert([postData]); error = e; }
    if (error) alert('Erreur: ' + error.message);
    else { alert('Article enregistré'); closeBlogModal(); loadBlogPosts(); }
  }

  async function deleteBlogPost(id) {
    if (confirm('Supprimer définitivement cet article ?')) {
      await sb.from('blog_posts').delete().eq('id', id);
      loadBlogPosts();
    }
  }

  function closeBlogModal() { document.getElementById('blogModal').classList.remove('active'); }

  // ... toutes les autres fonctions (loadComments, moderateComment, etc.) restent identiques ...
  // N'oublie pas de les recopier depuis ton admin.html actuel.

  window.onload = async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session && session.user.email === ADMIN_EMAIL) showPanel();
  };
</script>
</body>
</html>
