<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog | Guides & Conseils | ExpatBrazza</title>
<meta name="description" content="Guides pratiques, conseils et actualités pour les expatriés et résidents à Brazzaville et au Congo.">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root { --green:#00A550; --text:#1A1F2E; --muted:#6B7280; --border:#DDE1E7; --bg:#F5F7FA; --card:#fff; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); }
  nav { background:#fff; border-bottom:1px solid var(--border); padding:0 24px; height:60px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
  .logo-icon { width:34px; height:34px; background:linear-gradient(135deg,#00A550,#00c764); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:17px; }
  .logo-text { font-family:'Syne',sans-serif; font-weight:800; font-size:18px; color:var(--text); }
  .logo-text span { color:var(--green); }
  .btn-back { color:var(--muted); text-decoration:none; font-size:13px; display:flex; align-items:center; gap:4px; padding:6px 12px; border-radius:8px; border:1px solid var(--border); transition:all 0.2s; }
  .btn-back:hover { color:var(--green); border-color:var(--green); }
  .hero { background:linear-gradient(135deg,rgba(0,165,80,0.08),rgba(0,165,80,0.02)); padding:48px 24px; text-align:center; }
  .hero h1 { font-family:'Syne',sans-serif; font-size:clamp(28px,5vw,42px); font-weight:800; margin-bottom:12px; }
  .hero h1 span { color:var(--green); }
  .hero p { color:var(--muted); font-size:16px; max-width:560px; margin:0 auto; line-height:1.6; }
  .section { max-width:1100px; margin:0 auto; padding:48px 20px; }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:16px; overflow:hidden; cursor:pointer; transition:all 0.25s; }
  .card:hover { transform:translateY(-4px); box-shadow:0 12px 32px rgba(0,0,0,0.1); border-color:var(--green); }
  .card-img { height:150px; display:flex; align-items:center; justify-content:center; font-size:48px; background:linear-gradient(135deg,#E8F5EE,#F0F9F4); }
  .card-body { padding:18px; }
  .card-body h3 { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; margin-bottom:8px; line-height:1.3; }
  .card-body p { color:var(--muted); font-size:13px; line-height:1.6; margin-bottom:12px; }
  .card-meta { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); padding-top:10px; border-top:1px solid var(--border); }
  .tag { display:inline-block; background:rgba(0,165,80,0.1); color:var(--green); font-size:11px; font-weight:700; padding:4px 12px; border-radius:6px; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:14px; }
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(8px); z-index:1000; display:none; align-items:flex-start; justify-content:center; padding:20px; overflow-y:auto; }
  .overlay.active { display:flex; }
  .article-modal { background:var(--card); border-radius:20px; max-width:720px; width:100%; margin:auto; animation:up 0.3s ease; }
  @keyframes up { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .article-header { padding:60px 40px 32px; position:relative; }
  .article-emoji { font-size:56px; margin-bottom:20px; display:block; }
  .article-header h2 { font-family:'Syne',sans-serif; font-size:24px; font-weight:800; margin-bottom:8px; line-height:1.3; }
  .article-body { padding:0 40px 40px; }
  .article-body p { color:var(--muted); line-height:1.85; margin-bottom:16px; font-size:15px; }
  .btn-close { position:absolute; top:16px; right:16px; background:var(--border); border:none; width:32px; height:32px; border-radius:8px; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; }
  /* Commentaires */
  .comments-section { margin-top: 48px; border-top: 2px solid var(--border); padding-top: 32px; }
  .comment { background: var(--bg); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .comment-author { font-weight: 700; margin-bottom: 4px; }
  .comment-date { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .comment-content { font-size: 14px; line-height: 1.6; }
  .comment-form { margin-top: 32px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
  .comment-form input, .comment-form textarea { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; }
  .comment-form button { background: var(--green); color: #fff; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: 600; }
  footer { background:#1A1F2E; color:#fff; text-align:center; padding:20px; font-size:13px; margin-top:60px; }
  footer a { color:var(--green); text-decoration:none; }
  @media(max-width:768px){ .grid{grid-template-columns:1fr;} .article-header{padding:40px 20px 24px;} .article-body{padding:0 20px 32px;} }
  @media(max-width:600px){ .grid{grid-template-columns:repeat(2,1fr);gap:12px;} }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">
    <img src="EB_globe_logo_blanc.png" alt="ExpatBrazza" style="height:38px;">
  </a>
  <a href="index.html" class="btn-back">← Accueil</a>
</nav>

<div class="hero">
  <h1>Blog <span>ExpatBrazza</span></h1>
  <p>Guides pratiques, conseils et bons plans pour les expatriés et résidents au Congo</p>
</div>

<div class="section">
  <div class="grid" id="blogGrid">
    <div class="loading" style="grid-column:1/-1; text-align:center; padding:40px;">Chargement des articles...</div>
  </div>
</div>

<!-- MODAL ARTICLE -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="article-modal">
    <div class="article-header">
      <button class="btn-close" onclick="document.getElementById('overlay').classList.remove('active')">✕</button>
      <span class="article-emoji" id="aEmoji"></span>
      <span class="tag" id="aTag"></span>
      <h2 id="aTitle"></h2>
      <div class="meta" id="aMeta"></div>
    </div>
    <div class="article-body" id="aBody"></div>
  </div>
</div>

<footer>
  <p>© 2026 ExpatBrazza — <a href="index.html">Retour à l'accueil</a></p>
</footer>

<script>
  const SUPABASE_URL = 'https://zpoitnronthawiovlnkm.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpwb2l0bnJvbnRoYXdpb3ZsbmttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjkzNzgsImV4cCI6MjA5MDA0NTM3OH0.kLIWKReNwqpG-VYf_tN14P9cQq-0z3fsIQffaFvOeUA';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let articlesData = [];

  async function loadArticles() {
    const { data, error } = await sb
      .from('blog_posts')
      .select('*')
      .eq('published', true)
      .order('published_at', { ascending: false });
    if (error) {
      console.error(error);
      document.getElementById('blogGrid').innerHTML = '<div class="empty">Erreur de chargement</div>';
      return;
    }
    articlesData = data || [];
    renderGrid();
  }

  function getEmojiFromTitle(title) {
    const emojis = { 'installer': '🏙️', 'logement': '🏠', 'travail': '💼', 'emploi': '💼', 'déplacer': '🚗', 'transport': '🚗', 'santé': '🏥', 'école': '🎓', 'banque': '💰', 'coût': '💰' };
    const lower = title.toLowerCase();
    for (let [key, emoji] of Object.entries(emojis)) {
      if (lower.includes(key)) return emoji;
    }
    return '📰';
  }

  function renderGrid() {
    const grid = document.getElementById('blogGrid');
    if (!articlesData.length) {
      grid.innerHTML = '<div class="empty" style="grid-column:1/-1; text-align:center; padding:40px;">Aucun article pour le moment. Revenez bientôt !</div>';
      return;
    }
    grid.innerHTML = articlesData.map(article => `
      <div class="card" data-id="${article.id}">
        <div class="card-img" style="background:linear-gradient(135deg,#E8F5EE,#F0F9F4)">${getEmojiFromTitle(article.title)}</div>
        <div class="card-body">
          <span class="tag">Article</span>
          <h3>${escapeHtml(article.title)}</h3>
          <p>${escapeHtml(article.excerpt || article.content.substring(0, 100).replace(/<[^>]*>/g, ''))}...</p>
          <div class="card-meta">
            <span>✍️ ExpatBrazza</span>
            <span>${new Date(article.published_at || article.created_at).toLocaleDateString('fr-FR')}</span>
          </div>
        </div>
      </div>
    `).join('');
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', () => {
        const id = parseInt(card.dataset.id);
        const article = articlesData.find(a => a.id === id);
        if (article) openArticle(article);
      });
    });
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  async function openArticle(article) {
    document.getElementById('aEmoji').textContent = getEmojiFromTitle(article.title);
    document.getElementById('aTag').textContent = 'Article';
    document.getElementById('aTitle').textContent = escapeHtml(article.title);
    const date = new Date(article.published_at || article.created_at).toLocaleDateString('fr-FR');
    document.getElementById('aMeta').innerHTML = `✍️ ExpatBrazza · 📅 ${date}`;
    document.getElementById('aBody').innerHTML = article.content;

    // Charger les commentaires approuvés pour cet article
    const { data: comments } = await sb
      .from('blog_comments')
      .select('*')
      .eq('post_id', article.id)
      .eq('status', 'approuve')
      .order('created_at', { ascending: true });

    // Construire la section commentaires
    let commentsHtml = `<div class="comments-section"><h3>💬 Commentaires (${comments?.length || 0})</h3>`;
    if (comments && comments.length > 0) {
      comments.forEach(c => {
        commentsHtml += `
          <div class="comment">
            <div class="comment-author">${escapeHtml(c.author_name)}</div>
            <div class="comment-date">${new Date(c.created_at).toLocaleDateString('fr-FR')}</div>
            <div class="comment-content">${escapeHtml(c.content)}</div>
          </div>
        `;
      });
    } else {
      commentsHtml += `<p>Soyez le premier à laisser un commentaire !</p>`;
    }

    // Formulaire d'ajout de commentaire (même non connecté)
    commentsHtml += `
      <div class="comment-form">
        <h4>Laisser un commentaire</h4>
        <form id="commentForm" onsubmit="submitComment(event, ${article.id})">
          <input type="text" id="commentName" placeholder="Votre nom" required>
          <input type="email" id="commentEmail" placeholder="Votre email (optionnel)">
          <textarea id="commentContent" rows="3" placeholder="Votre commentaire..." required></textarea>
          <button type="submit">Envoyer le commentaire</button>
        </form>
        <p style="font-size:12px; color:var(--muted); margin-top:10px;">Votre commentaire sera visible après validation par l'administrateur.</p>
      </div>
    `;

    document.getElementById('aBody').innerHTML += commentsHtml;
    document.getElementById('overlay').classList.add('active');
  }

  // Fonction globale pour soumettre un commentaire
  window.submitComment = async function(event, postId) {
    event.preventDefault();
    const name = document.getElementById('commentName').value.trim();
    const email = document.getElementById('commentEmail').value.trim();
    const content = document.getElementById('commentContent').value.trim();
    if (!name || !content) return;

    // Récupérer l'utilisateur connecté (si présent)
    const { data: { session } } = await sb.auth.getSession();
    const userId = session?.user?.id || null;

    const { error } = await sb.from('blog_comments').insert([{
      post_id: postId,
      user_id: userId,
      author_name: name,
      author_email: email || null,
      content: content,
      status: 'en_attente'
    }]);

    if (error) {
      alert('Erreur : ' + error.message);
    } else {
      alert('Merci ! Votre commentaire sera publié après validation.');
      document.getElementById('commentForm').reset();
      // Recharger les commentaires sans fermer le modal (simple : on recharge la page)
      // Pour une meilleure UX, on pourrait recharger juste les commentaires, mais on ferme et rouvre ?
      // Ici, on referme et rouvre pour simplifier
      const overlay = document.getElementById('overlay');
      overlay.classList.remove('active');
      // Re-open same article after a short delay
      setTimeout(() => openArticle(articlesData.find(a => a.id === postId)), 200);
    }
  };

  function closeModal(e) {
    if (e.target === document.getElementById('overlay')) {
      document.getElementById('overlay').classList.remove('active');
    }
  }

  window.onload = loadArticles;
</script>
</body>
</html>
