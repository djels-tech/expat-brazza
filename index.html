<style>
  :root {
    --green: #00A550;
    --yellow: #F9C003;
    --red: #CE1126;
    --dark: #F5F7FA;
    --darker: #EAECF0;
    --card: #FFFFFF;
    --border: #DDE1E7;
    --text: #1A1F2E;
    --muted: #6B7280;
    --accent: #00A550;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--text);
    overflow-x: hidden;
  }

  /* NAVBAR */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo-icon {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, #00A550, #00c764);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 12px rgba(0,165,80,0.3);
  }

  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    color: var(--text);
  }

  .logo-text span { color: var(--green); }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 8px;
    list-style: none;
  }

  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 14px;
    padding: 6px 12px;
    border-radius: 6px;
    transition: all 0.2s;
  }

  .nav-links a:hover { color: var(--text); background: var(--border); }

  .btn-post {
    background: var(--green);
    color: white !important;
    font-weight: 500;
    padding: 8px 16px !important;
    border-radius: 8px !important;
  }

  .btn-post:hover { background: #00c764 !important; transform: translateY(-1px); }

  /* HERO */
  .hero {
    margin-top: 60px;
    padding: 80px 24px 60px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,165,80,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .congo-flag {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-bottom: 20px;
  }

  .flag-stripe {
    width: 24px;
    height: 8px;
    border-radius: 2px;
  }

  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 16px;
    letter-spacing: -1px;
  }

  .hero h1 span { color: var(--green); }

  .hero p {
    color: var(--muted);
    font-size: 18px;
    max-width: 520px;
    margin: 0 auto 40px;
    line-height: 1.6;
  }

  /* SEARCH BAR */
  .search-container {
    max-width: 640px;
    margin: 0 auto 60px;
    position: relative;
  }

  .search-bar {
    display: flex;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .search-bar:focus-within { border-color: var(--green); }

  .search-bar input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    padding: 16px 20px;
    color: var(--text);
    font-size: 16px;
    font-family: 'DM Sans', sans-serif;
  }

  .search-bar input::placeholder { color: var(--muted); }

  .search-btn {
    background: var(--green);
    border: none;
    padding: 0 24px;
    cursor: pointer;
    color: white;
    font-size: 20px;
    transition: background 0.2s;
  }

  .search-btn:hover { background: #00c764; }

  /* STATS */
  .stats {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-bottom: 60px;
    flex-wrap: wrap;
  }

  .stat {
    text-align: center;
    animation: fadeUp 0.6s ease forwards;
    opacity: 0;
  }

  .stat:nth-child(1) { animation-delay: 0.1s; }
  .stat:nth-child(2) { animation-delay: 0.2s; }
  .stat:nth-child(3) { animation-delay: 0.3s; }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    color: var(--green);
  }

  .stat-label { font-size: 13px; color: var(--muted); margin-top: 4px; }

  /* CATEGORIES */
  .section { padding: 60px 24px; max-width: 1200px; margin: 0 auto; }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 700;
  }

  .see-all {
    color: var(--green);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
  }

  .categories-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
  }

  .category-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    text-decoration: none;
    color: var(--text);
    display: block;
  }

  .category-card:hover {
    border-color: var(--green);
    transform: translateY(-3px);
    background: rgba(0,165,80,0.08);
  }

  .category-icon {
    font-size: 28px;
    margin-bottom: 10px;
    display: block;
  }

  .category-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .category-count {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ANNONCES */
  .annonces-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .annonce-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
  }

  .annonce-card:hover {
    border-color: var(--green);
    transform: translateY(-4px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }

  .annonce-img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    background: linear-gradient(135deg, #e8f5ee, #f0f9f4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
  }

  .badge-une {
    position: absolute;
    top: 12px;
    left: 12px;
    background: var(--yellow);
    color: #000;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .badge-new {
    position: absolute;
    top: 12px;
    left: 12px;
    background: var(--green);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 6px;
  }

  .annonce-body { padding: 16px; }

  .annonce-cat {
    font-size: 11px;
    color: var(--green);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .annonce-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 8px;
    line-height: 1.4;
    color: var(--text);
  }

  .annonce-price {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--green);
    margin-bottom: 12px;
  }

  .annonce-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .annonce-location {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .annonce-actions {
    display: flex;
    gap: 8px;
  }

  .action-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--dark);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
    color: var(--muted);
    text-decoration: none;
  }

  .action-btn:hover { border-color: var(--green); color: var(--green); }
  .action-btn.whatsapp:hover { border-color: #25D366; color: #25D366; }

  /* BANNER */
  .banner {
    background: linear-gradient(135deg, rgba(0,165,80,0.15), rgba(0,165,80,0.05));
    border: 1px solid rgba(0,165,80,0.3);
    border-radius: 16px;
    padding: 40px;
    text-align: center;
    margin: 40px 0;
  }

  .banner h2 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .banner p { color: var(--muted); margin-bottom: 24px; }

  .btn-primary {
    background: var(--green);
    color: white;
    border: none;
    padding: 14px 28px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-block;
  }

  .btn-primary:hover { background: #00c764; transform: translateY(-2px); }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    max-width: 500px;
    width: 100%;
    position: relative;
    animation: modalIn 0.3s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    background: var(--border);
    border: none;
    color: var(--muted);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s;
  }

  .modal-close:hover { background: var(--red); color: white; }

  .modal h2 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 24px;
  }

  .form-group { margin-bottom: 16px; }

  .form-group label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--green); }

  .form-group textarea { resize: vertical; min-height: 80px; }

  .form-group select option { background: var(--card); }

  /* FOOTER */
  footer {
    background: var(--darker);
    border-top: 1px solid var(--border);
    padding: 60px 24px 30px;
    margin-top: 60px;
  }

  .footer-grid {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr;
    gap: 40px;
    margin-bottom: 40px;
  }

  .footer-brand p {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
    margin-top: 12px;
    max-width: 260px;
  }

  .footer-col h4 {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--text);
  }

  .footer-col a {
    display: block;
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    margin-bottom: 10px;
    transition: color 0.2s;
  }

  .footer-col a:hover { color: var(--green); }

  .footer-bottom {
    max-width: 1200px;
    margin: 0 auto;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: var(--muted);
  }

  .footer-flag {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .fs { width: 16px; height: 6px; border-radius: 1px; }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-up {
    animation: fadeUp 0.6s ease forwards;
    opacity: 0;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--green);
    color: white;
    padding: 14px 20px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    z-index: 9999;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
    box-shadow: 0 8px 24px rgba(0,165,80,0.4);
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  /* RESPONSIVE */
  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .hamburger span {
    width: 22px;
    height: 2px;
    background: var(--text);
    border-radius: 2px;
    transition: all 0.3s;
  }
  .mobile-menu {
    display: none;
    position: fixed;
    top: 64px;
    left: 0;
    right: 0;
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    z-index: 99;
    flex-direction: column;
    gap: 4px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
  }
  .mobile-menu.active { display: flex; }
  .mobile-menu a {
    color: var(--text);
    text-decoration: none;
    font-size: 15px;
    padding: 12px 16px;
    border-radius: 8px;
    font-weight: 500;
    transition: background 0.2s;
  }
  .mobile-menu a:hover { background: rgba(0,165,80,0.08); color: var(--green); }
  .mobile-menu .btn-post-mobile {
    background: var(--green);
    color: white !important;
    text-align: center;
    margin-top: 8px;
    border-radius: 10px;
  }
  @media (max-width: 900px) {
    .hamburger { display: flex; }
    .nav-links { display: none; }
    .footer-grid { grid-template-columns: 1fr 1fr; }
    .stats { gap: 24px; }
  }

  @media (max-width: 480px) {
    .footer-grid { grid-template-columns: 1fr; }
    .footer-bottom { flex-direction: column; gap: 12px; text-align: center; }
  }

  /* FILTER TABS */
  .filter-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .filter-tab {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .filter-tab.active, .filter-tab:hover {
    border-color: var(--green);
    color: var(--green);
    background: rgba(0,165,80,0.08);
  }

  #photoInput { color: var(--text); }
  .annonce-card-img {
    width: 100%;
    height: 180px;
    object-fit: cover;
  }


  /* CITY SELECTOR */
  .city-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 2000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .city-modal {
    background: white;
    border-radius: 24px;
    padding: 40px 32px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    animation: modalIn 0.3s ease;
  }
  .city-modal h2 {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .city-modal p { color: var(--muted); margin-bottom: 28px; font-size: 15px; }
  .cities-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .city-btn {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
  }
  .city-btn:hover, .city-btn.selected {
    border-color: var(--green);
    background: rgba(0,165,80,0.08);
    color: var(--green);
  }
  .city-confirm {
    background: var(--green);
    color: white;
    border: none;
    padding: 14px 32px;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
  }
  .city-confirm:hover { background: #00c764; }
  .city-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,165,80,0.1);
    border: 1px solid rgba(0,165,80,0.2);
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--green);
    transition: all 0.2s;
  }
  .city-indicator:hover { background: rgba(0,165,80,0.15); }


  @media (max-width: 900px) {
    .logo-text { font-size: 16px; }
    .logo-icon { width: 32px; height: 32px; font-size: 16px; }
    .city-indicator { padding: 5px 8px; font-size: 12px; max-width: 110px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    nav { padding: 0 12px; }
  }
  @media (max-width: 380px) {
    .logo-text { font-size: 14px; }
    .city-indicator { max-width: 85px; font-size: 11px; }
  }


  /* FEATURED ANNONCES - Horizontal */
  .featured-annonces {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .annonce-card-featured {
    background: var(--card);
    border: 2px solid var(--yellow);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    flex-direction: row;
    height: 130px;
